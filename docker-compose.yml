services:
  postgres:
    image: postgres:15-alpine
    container_name: factory-intelligence_db
    restart: always
    environment:
      POSTGRES_USER: fi_admin
      POSTGRES_PASSWORD: fi_123
      POSTGRES_DB: fi_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fi_admin -d fi_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4.0
    container_name: factory-intelligence_aws
    ports:
      - "4566:4566"            
    environment:
      - SERVICES=s3,sqs
      - AWS_DEFAULT_REGION=eu-west-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: factory-intelligence_api
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fi_admin:fi_123@postgres:5432/fi_local
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-1
      - SQS_QUEUE_NAME=factory-intelligence-reports-queue
      - S3_BUCKET_NAME=factory-intelligence-reports
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data: